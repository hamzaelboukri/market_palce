version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15
    container_name: prosets-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: prosets
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - prosets-network

  # Backend API
  backend:
    build:
      context: ./packages/backend
      dockerfile: Dockerfile.dev
    container_name: prosets-backend
    restart: unless-stopped
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/prosets
    env_file:
      - .env
    ports:
      - "3001:3001"
    volumes:
      - ./packages/backend:/app
      - /app/node_modules
      - ./packages/backend/prisma:/app/prisma
    networks:
      - prosets-network

  # Frontend
  frontend:
    build:
      context: ./packages/frontend
      dockerfile: Dockerfile.dev
    container_name: prosets-frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001
    env_file:
      - .env
    ports:
      - "3000:3000"
    volumes:
      - ./packages/frontend:/app
      - /app/node_modules
    networks:
      - prosets-network
    depends_on:
      - backend

volumes:
  postgres_data:

networks:
  prosets-network:
    driver: bridge