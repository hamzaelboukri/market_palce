version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15
    container_name: prosets-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: prosets
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - prosets-network

  # Backend API
  backend:
    build:
      context: ./packages/backend
      dockerfile: Dockerfile.dev
    container_name: prosets-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/prosets
      NODE_ENV: development
      PORT: 3001
      CORS_ORIGIN: http://localhost:3000
      # Add your environment variables here
      # AUTH0_DOMAIN: ${AUTH0_DOMAIN}
      # AUTH0_CLIENT_ID: ${AUTH0_CLIENT_ID}
      # AUTH0_CLIENT_SECRET: ${AUTH0_CLIENT_SECRET}
      # AUTH0_CALLBACK_URL: http://localhost:3001/api/auth/callback
      # JWT_SECRET: ${JWT_SECRET}
      # STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      # STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
      # STRIPE_SUCCESS_URL: http://localhost:3000/success
      # STRIPE_CANCEL_URL: http://localhost:3000/cancel
      # AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      # AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      # AWS_REGION: ${AWS_REGION}
      # AWS_S3_BUCKET: ${AWS_S3_BUCKET}
      # AWS_S3_PUBLIC_BUCKET: ${AWS_S3_PUBLIC_BUCKET}
    ports:
      - "3001:3001"
    depends_on:
      - postgres
    volumes:
      - ./packages/backend:/app
      - ./packages/backend/prisma:/app/prisma
    networks:
      - prosets-network

  # Frontend
  frontend:
    build:
      context: ./packages/frontend
      dockerfile: Dockerfile.dev
    container_name: prosets-frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001
      # Add your environment variables here
      # AUTH0_SECRET: ${AUTH0_SECRET}
      # AUTH0_BASE_URL: http://localhost:3000
      # AUTH0_ISSUER_BASE_URL: https://${AUTH0_DOMAIN}.auth0.com
      # AUTH0_CLIENT_ID: ${AUTH0_CLIENT_ID}
      # NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY}
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - prosets-network

volumes:
  postgres_data:

networks:
  prosets-network:
    driver: bridge
